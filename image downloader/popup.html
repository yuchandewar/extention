<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freepik Downloader</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">F</div>
                <span>Freepik Icon DL</span>
            </div>
        </header>
        
        <main>
            <section class="status-card">
                <div class="status-indicator active"></div>
                <div class="status-info">
                    <p class="status-title">Active</p>
                    <p class="status-desc">Scanning for icons...</p>
                </div>
            </section>

            <div class="actions">
                <button id="downloadAll" class="btn primary">
                    <span>Download All on Page</span>
                </button>
            </div>
        </main>

        <footer>
            <p>Freepik Icon Downloader v1.0</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
